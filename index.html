function buildSubject(sg,sgender,sage,seth,sbuild,shlen,shtex,shstyle,shcolor,soutfit,soutfitcolor,spose,sexp){
  if(!sg||sg==="none") return "";
  if(sg==="packed") return "a massive packed crowd of people, hundreds of figures filling every inch of the frame";
  if(sg==="crowd") return "a large crowd of people";
  if(sg==="group") return "a small group of people (3-5)";
  if(sg==="two"){
    const bits=["two people"];
    if(spose) bits.push(spose);
    if(sexp) bits.push(sexp);
    return bits.join(", ");
  }
  // Solo
  const parts=[];
  const youngAges=["toddler","child","pre-teen","teenager"];
  const buildStr=sbuild?`${sbuild} `:"";
  const ethStr=seth?`${seth} `:"";
  const genderStr=sgender||"person";
  if(youngAges.includes(sage)) parts.push(`a ${buildStr}${ethStr}${genderStr} who is a ${sage}`);
  else{
    parts.push(`a ${buildStr}${ethStr}${genderStr}`);
    if(sage) parts.push(`in their ${sage}`);
  }
  // Hair
  if(shlen==="buzzed"){
    parts.push("with a buzzed shaved head");
  } else if(shlen||shtex||shstyle||shcolor){
    const lenStr=shlen?`${shlen} `:"";
    const texStr=shtex?`${shtex} `:"";
    const colorStr=shcolor?`${shcolor} `:"";
    const styleStr=shstyle?` ${shstyle}`:"";
    parts.push(`with ${colorStr}${lenStr}${texStr}hair${styleStr}`);
  }
  // Outfit
  if(soutfit||soutfitcolor){
    const colorStr=soutfitcolor?`${soutfitcolor} `:"";
    const outfitStr=soutfit||"clothing";
    parts.push(`wearing ${colorStr}${outfitStr}`);
  }
  if(spose) parts.push(spose);
  if(sexp) parts.push(sexp);
  return parts.filter(Boolean).join(", ");
}

function buildPrompt({subject,settingObj,quality,moodObj,timeObj,cameraObj,ratio,stylize,custom,recipeObj,paletteObj,eraObj,textureObj,chaos,weird,raw,noText}){
  const p=[];
  const sv=settingObj?settingObj.v:"";
  const camV=cameraObj?cameraObj.v:"";
  const qualStr=quality&&quality.length?quality.join(", "):"";
  // MJ responds best when the visual identity comes first, then palette/era, then subject/world/light.
  if(recipeObj&&recipeObj.v) p.push(recipeObj.v);
  if(qualStr) p.push(qualStr);
  if(paletteObj&&paletteObj.v) p.push(paletteObj.v);
  if(eraObj&&eraObj.v) p.push(eraObj.v);
  if(subject) p.push(subject);
  if(sv) p.push(sv);
  if(timeObj) p.push(timeObj.v);
  if(moodObj) p.push(moodObj.v);
  if(camV) p.push(camV);
  if(textureObj&&textureObj.v) p.push(textureObj.v);
  if(custom) p.push(custom);
  if(noText) p.push("no visible text, no readable words, no logos, no watermarks");
  const filled=p.filter(x=>x&&x.trim());
  if(!filled.length) return "";
  let params=" --v 7 --ar "+ratio+" --s "+stylize;
  if(chaos>0) params += " --chaos "+chaos;
  if(weird>0) params += " --weird "+weird;
  if(raw) params += " --style raw";
  return filled.join(", ")+params;
}

  const copy=async()=>{
    if(!prompt)return;
    try{await navigator.clipboard.writeText(prompt);}catch{}
    setCopied(true);setTimeout(()=>setCopied(false),2200);
  };

  const reset=()=>{setRecipe(null);setPalette(null);setEra(null);setTexture(null);setChaos(0);setWeird(0);setRaw(false);setNoText(true);setSg(null);setSgender(null);setSage(null);setSeth(null);setSbuild(null);setShlen(null);setShtex(null);setShstyle(null);setShcolor(null);setSoutfit(null);setSoutfitcolor(null);setSpose(null);setSexp(null);setSval("");setMood(null);setTime(null);setCam(null);setQualCat("Photographic");setQualSels([]);setRatio("16:9");setStyl(250);setCustom("");};



  return <>
    <style>{CSS}</style>
    <style>{arrCSS}</style>
    <div className="app" style={vars}>

      <div className="hdr">
        <div className="hdr-row">
          <div>
            <div className="hdr-logo">SceneForge</div>
            <div className="hdr-sub">MidJourney V7 Prompt Builder</div>
          </div>
          <div className="swatches">
            {Object.entries(THEMES).map(([k,t])=>(
              <div key={k} className={`sw ${theme===k?"on":""}`}
                style={{background:`linear-gradient(135deg,${t.dot1} 50%,${t.dot2} 50%)`}}
                onClick={()=>setTheme(k)} title={t.name}/>
            ))}
          </div>
        </div>
      </div>

      <div className="reset-bar">
        <button className="reset-btn" onClick={reset}>↺ Reset</button>
      </div>

      <div className="sections">

        {/* 01 VISUAL STYLE & QUALITY */}
        <div className="sec">
          <SH n={1} t="Visual Style & Quality"/>
          <div className="subrow-lbl" style={{marginBottom:"0.45rem"}}>Pick up to 3 — sets the rendering medium MidJourney builds from</div>
          <div className="stabs">
            {Object.keys(VISUAL_QUALITY).map(cat=>(
              <button key={cat} className={`stab ${qualCat===cat?"on":""}`} onClick={()=>setQualCat(cat)}>{cat}</button>
            ))}
          </div>
          <div className="pills">
            {VISUAL_QUALITY[qualCat].map(it=>(
              <button key={it.v}
                className={`pill ${qualSels.includes(it.v)?"on":""}`}
                onClick={()=>{
                  if(qualSels.includes(it.v)) setQualSels(qualSels.filter(x=>x!==it.v));
                  else if(qualSels.length<3) setQualSels([...qualSels,it.v]);
                }}>
                {it.label}
              </button>
            ))}
          </div>
          {qualSels.length>0&&(
            <div style={{marginTop:"0.5rem",display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
              {qualSels.map(v=>{
                const found=Object.values(VISUAL_QUALITY).flat().find(it=>it.v===v);
                return found?(<div key={v} style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.18rem 0.45rem",border:"1px solid var(--pri)",borderRadius:"2px",background:"var(--priG)"}}>
                  <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:"0.5rem",color:"var(--pri)"}}>{found.label}</span>
                  <button onClick={()=>setQualSels(qualSels.filter(x=>x!==v))} style={{background:"none",border:"none",color:"var(--pri)",cursor:"pointer",fontSize:"0.6rem",padding:0,lineHeight:1}}>✕</button>
                </div>):null;
              })}
            </div>
          )}
        </div>

        <div className="div"/>

        {/* 02 AESTHETIC ENGINE */}
        <div className="sec">
          <SH n={2} t="Aesthetic Engine"/>
          <div className="subrow-lbl" style={{marginBottom:"0.45rem"}}>This is the secret sauce — choose the image family before the subject gets too loud</div>
          <div className="subrow">
            <div className="subrow-lbl">Image Recipe</div>
            <div className="pills">{VISUAL_RECIPES.map(it=><button key={it.v} className={`pill ${recipe===it.v?"on":""}`} onClick={()=>setRecipe(recipe===it.v?null:it.v)}>{it.label}</button>)}</div>
          </div>
          <div className="subrow" style={{marginTop:"0.65rem"}}>
            <div className="subrow-lbl">Palette Discipline</div>
            <div className="pills">{PALETTES.map(it=><button key={it.label} className={`pill ${palette===it.v?"on":""}`} onClick={()=>setPalette(palette===it.v?null:it.v)}>{it.label}</button>)}</div>
          </div>
          <div className="subrow" style={{marginTop:"0.65rem"}}>
            <div className="subrow-lbl">Era Anchor</div>
            <div className="pills">{ERAS.map(it=><button key={it.label} className={`pill ${era===it.v?"on":""}`} onClick={()=>setEra(era===it.v?null:it.v)}>{it.label}</button>)}</div>
          </div>
          <div className="subrow" style={{marginTop:"0.65rem"}}>
            <div className="subrow-lbl">Texture / Atmosphere</div>
            <div className="pills">{TEXTURE_ATMOS.map(it=><button key={it.v} className={`pill ${texture===it.v?"on":""}`} onClick={()=>setTexture(texture===it.v?null:it.v)}>{it.label}</button>)}</div>
          </div>
        </div>

        <div className="div"/>

        {/* 03 SUBJECT */}
        <div className="sec">
          <SH n={3} t="Who's in it?"/>
          <div className="subrows">
            <div className="subrow">
              <div className="subrow-lbl">Group Size</div>
              <div className="pills">{SUBJ_GROUP.map(it=><button key={it.v} className={`pill ${sg===it.v?"on":""}`} onClick={()=>setSg(sg===it.v?null:it.v)}>{it.label}</button>)}</div>
            </div>
            {(sg==="solo"||sg==="two")&&<>
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Gender</div>
                <div className="pills">{SUBJ_GENDER.map(it=><button key={it.v} className={`pill ${sgender===it.v?"on":""}`} onClick={()=>setSgender(sgender===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Age</div>
                <div className="pills">{SUBJ_AGE.map(it=><button key={it.v} className={`pill ${sage===it.v?"on":""}`} onClick={()=>setSage(sage===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Ethnicity</div>
                <div className="pills">{SUBJ_ETHNICITY.map(it=><button key={it.v} className={`pill ${seth===it.v?"on":""}`} onClick={()=>setSeth(seth===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Build</div>
                <div className="pills">{SUBJ_BUILD.map(it=><button key={it.v} className={`pill ${sbuild===it.v?"on":""}`} onClick={()=>setSbuild(sbuild===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow-lbl" style={{marginTop:"0.2rem",paddingTop:"0.4rem",borderTop:"1px solid var(--bd)"}}>HAIR</div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Length</div>
                <div className="pills">{SUBJ_HAIR_LEN.map(it=><button key={it.v} className={`pill ${shlen===it.v?"on":""}`} onClick={()=>setShlen(shlen===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Texture</div>
                <div className="pills">{SUBJ_HAIR_TEX.map(it=><button key={it.v} className={`pill ${shtex===it.v?"on":""}`} onClick={()=>setShtex(shtex===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Hair Style</div>
                <div className="pills">{SUBJ_HAIR_STYLE.map(it=><button key={it.v} className={`pill ${shstyle===it.v?"on":""}`} onClick={()=>setShstyle(shstyle===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>}
              {sg==="solo"&&<div className="subrow">
                <div className="subrow-lbl">Hair Color</div>
                <div className="cpills">{COLORS.map(it=><button key={it.v} className={`cpill ${shcolor===it.v?"on":""}`} onClick={()=>setShcolor(shcolor===it.v?null:it.v)}><span className="cdot" style={{background:it.hex}}/>{it.label}</button>)}</div>
              </div>}
              <div className="subrow-lbl" style={{marginTop:"0.2rem",paddingTop:"0.4rem",borderTop:"1px solid var(--bd)"}}>OUTFIT</div>
              <div className="subrow">
                <div className="subrow-lbl">Style</div>
                <div className="pills">{SUBJ_OUTFIT.map(it=><button key={it.v} className={`pill ${soutfit===it.v?"on":""}`} onClick={()=>setSoutfit(soutfit===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>
              <div className="subrow">
                <div className="subrow-lbl">Outfit Color</div>
                <div className="cpills">{COLORS.map(it=><button key={it.v} className={`cpill ${soutfitcolor===it.v?"on":""}`} onClick={()=>setSoutfitcolor(soutfitcolor===it.v?null:it.v)}><span className="cdot" style={{background:it.hex}}/>{it.label}</button>)}</div>
              </div>
              <div className="subrow-lbl" style={{marginTop:"0.2rem",paddingTop:"0.4rem",borderTop:"1px solid var(--bd)"}}>ACTION</div>
              <div className="subrow">
                <div className="subrow-lbl">Pose / Action</div>
                <div className="pills">{SUBJ_POSE.map(it=><button key={it.v} className={`pill ${spose===it.v?"on":""}`} onClick={()=>setSpose(spose===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>
              <div className="subrow">
                <div className="subrow-lbl">Expression / Energy</div>
                <div className="pills">{SUBJ_EXPRESSION.map(it=><button key={it.v} className={`pill ${sexp===it.v?"on":""}`} onClick={()=>setSexp(sexp===it.v?null:it.v)}>{it.label}</button>)}</div>
              </div>
            </>}
            {builtSubject&&<div className="subj-preview">{builtSubject}</div>}
            {!builtSubject&&sg&&sg!=="none"&&sg!=="solo"&&sg!=="two"&&<div className="subj-preview subj-preview-empty">{sg==="group"?"a small group of people":sg==="crowd"?"a large crowd of people":"a massive packed crowd"}</div>}
          </div>
        </div>

        <div className="div"/>

        {/* 03 WHERE */}
        <div className="sec">
          <SH n={4} t="Where?"/>
          <div className="stabs">
            {Object.keys(SETTINGS).map(cat=><button key={cat} className={`stab ${scat===cat?"on":""}`} onClick={()=>changeScat(cat)}>{cat}</button>)}
          </div>
          <select value={sval} onChange={e=>setSval(e.target.value)}>
            <option value="">— Pick a setting —</option>
            {SETTINGS[scat].map(s=><option key={s.v} value={s.v}>{s.label}</option>)}
          </select>
        </div>

        <div className="div"/>

        {/* 04 LIGHT & TIME */}
        <div className="sec">
          <SH n={5} t="Light & Time"/>
          <PillGroup items={TIMES} val={time} onToggle={setTime}/>
        </div>

        <div className="div"/>

        {/* 05 THE FEELING */}
        <div className="sec">
          <SH n={6} t="The Feeling"/>
          <PillGroup items={MOODS} val={mood} onToggle={setMood}/>
        </div>

        <div className="div"/>

        {/* 06 CAMERA */}
        <div className="sec">
          <SH n={7} t="Camera Angle"/>
          <PillGroup items={CAMERAS} val={cam} onToggle={setCam}/>
        </div>

        <div className="div"/>

        {/* 07 CUSTOM */}
        <div className="sec">
          <SH n={8} t="Anything Else?"/>
          <FL c="Specific details, objects, colors, textures — things the buttons don't cover"/>
          <textarea className="custom-in" value={custom} onChange={e=>setCustom(e.target.value)}
            placeholder="e.g. her jacket is slightly wet, a blurred taxi in the background, steam rising from a grate nearby..."/>
        </div>

        <div className="div"/>

        {/* 08 PARAMS */}
        <div className="sec">
          <SH n={9} t="Output Settings"/>
          <div className="field">
            <FL c="Aspect Ratio"/>
            <div className="pills">
              {RATIOS.map(r=><button key={r.v} className={`pill ${ratio===r.v?"on":""}`} onClick={()=>setRatio(r.v)}>{r.label}</button>)}
            </div>
          </div>
          <div className="slider-wrap">
            <div className="slider-row">
              <FL c="Stylize" note={<span style={{fontSize:"0.52rem",color:"var(--di)"}}>--s</span>}/>
              <span className="slider-val">{styl}</span>
            </div>
            <input type="range" min={50} max={900} value={styl}
              style={{background:`linear-gradient(to right,var(--pri) 0%,var(--pri) ${((styl-50)/850)*100}%,var(--bdH) ${((styl-50)/850)*100}%,var(--bdH) 100%)`}}
              onChange={e=>setStyl(parseInt(e.target.value))}/>
            <div className="szones"><span>Literal / photo</span><span>Cinematic</span><span>Painterly</span><span>MJ takes over</span></div>
          </div>
          <div className="slider-wrap" style={{marginTop:"0.9rem"}}>
            <div className="slider-row">
              <FL c="Chaos" note={<span style={{fontSize:"0.52rem",color:"var(--di)"}}>--chaos</span>}/>
              <span className="slider-val">{chaos}</span>
            </div>
            <input type="range" min={0} max={80} value={chaos}
              style={{background:`linear-gradient(to right,var(--sec) 0%,var(--sec) ${(chaos/80)*100}%,var(--bdH) ${(chaos/80)*100}%,var(--bdH) 100%)`}}
              onChange={e=>setChaos(parseInt(e.target.value))}/>
            <div className="szones"><span>Locked in</span><span>Some surprise</span><span>Wild cards</span><span>Chaos beast</span></div>
          </div>
          <div className="slider-wrap" style={{marginTop:"0.9rem"}}>
            <div className="slider-row">
              <FL c="Weird" note={<span style={{fontSize:"0.52rem",color:"var(--di)"}}>--weird</span>}/>
              <span className="slider-val">{weird}</span>
            </div>
            <input type="range" min={0} max={1000} value={weird}
              style={{background:`linear-gradient(to right,var(--sec) 0%,var(--sec) ${(weird/1000)*100}%,var(--bdH) ${(weird/1000)*100}%,var(--bdH) 100%)`}}
              onChange={e=>setWeird(parseInt(e.target.value))}/>
            <div className="szones"><span>Normal</span><span>Odd</span><span>Strange</span><span>Dream machine</span></div>
          </div>
          <div className="pills" style={{marginTop:"0.9rem"}}>
            <button className={`pill ${raw?"on":""}`} onClick={()=>setRaw(!raw)}>Style Raw</button>
            <button className={`pill ${noText?"on":""}`} onClick={()=>setNoText(!noText)}>No Text / Logos</button>
          </div>
        </div>

      </div>

      <div className="pbar">
        <div className="pbar-lbl">Generated Prompt</div>
        <div className="pout">
          {prompt
            ?<><span>{promptScene}</span><span className="pout-p">{promptParams?" "+promptParams:""}</span></>
            :<span className="pout-empty">Select a visual style and start building — your prompt assembles here</span>}
        </div>
        <button className={`copy-btn ${copied?"ok":""}`} onClick={copy} disabled={!prompt}>
          {copied?"✓  Copied to Clipboard":"Copy Prompt →"}
        </button>
      </div>

    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
